# deYangar 分组配置（TOML格式，用于 Clash 等）
# 注意：组名不加emoji，因为emoji主要用于节点名；rulesets.txt里引用这里定义的组名

#========== 主选择 / 自动测速 ==========
[[custom_groups]]
name = "🚀 节点选择"
type = "select"
rule = ["[]🚀 手动切换", "[]♻️ 自动选择", "[]🇭🇰 香港", "[]🇹🇼 台湾", "[]🇯🇵 日本", "[]🇸🇬 新加坡", "[]🇲🇾 马来西亚", "[]🇺🇲 美国", "[]🇬🇧 英国", "[]🇦🇺 澳大利亚", "[]🇦🇷 阿根廷", "[]🇮🇳 印度", "[]🛩️ 手动选择备用", "[]DIRECT"]

[[custom_groups]]
name = "🚀 手动切换"
type = "select"
rule = ["[]DIRECT", ".*"]

[[custom_groups]]
name = "🛩️ 手动选择备用"
type = "select"
rule = ["[]DIRECT", ".*"]

[[custom_groups]]
name = "♻️ 自动选择"
type = "url-test"
rule = [".*"]
url = "http://www.gstatic.com/generate_204"
interval = 300
tolerance = 50

